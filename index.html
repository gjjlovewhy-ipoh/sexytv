<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高清直播播放器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:system-ui}
/* 顶部播放器固定 */
.player-box{position:sticky;top:0;width:100%;background:#000;padding:10px 10px 0;z-index:10}
video{width:100%;height:auto;max-height:70vh;border-radius:8px;background:#000}
/* 频道宫格 */
.channel-wrap{padding:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:768px){.channel-wrap{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.channel-wrap{grid-template-columns:repeat(2,1fr)}}
.channel-item{background:#222;border:1px solid #444;border-radius:6px;padding:8px;text-align:center;cursor:pointer;font-size:14px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-item:hover{background:#007bff;border-color:#007bff}
.channel-item.active{background:#0056b3;border-color:#0056b3}
.title{margin:10px;text-align:center;font-size:16px}
</style>
</head>

<body>
<div class="player-box">
    <video id="videoPlayer" controls autoplay playsinline></video>
</div>
<div class="title">电视频道列表（点击切换）</div>
<div id="channelGrid" class="channel-wrap"></div>

<script>
// 直播源地址
const m3uUrl = "https://gh-proxy.org/https://raw.githubusercontent.com/gjjlovewhy-ipoh/sexytv/refs/heads/main/best_sorted.m3u";
const videoEl = document.getElementById("videoPlayer");
const gridEl = document.getElementById("channelGrid");
let channelList = [];

// 加载并解析m3u
fetch(m3uUrl).then(res=>res.text()).then(text=>{
  const lines = text.split(/\n/).map(l=>l.trim()).filter(l=>l);
  let item = null;
  for(let line of lines){
    if(line.startsWith('#EXTINF')){
      item = {title:'', url:''};
      const nameMatch = line.match(/,(.+)$/);
      if(nameMatch) item.title = nameMatch[1].trim();
    }else if(line.startsWith('http') && item){
      item.url = line.trim();
      channelList.push(item);
      item = null;
    }
  }
  renderChannels();
  // 随机开播
  const rand = channelList[Math.floor(Math.random()*channelList.length)];
  play(rand);
}).catch(err=>console.error(err));

// 渲染宫格
function renderChannels(){
  gridEl.innerHTML = '';
  channelList.forEach((ch,idx)=>{
    const div = document.createElement('div');
    div.className = 'channel-item';
    div.textContent = ch.title;
    div.onclick = ()=>play(ch);
    gridEl.appendChild(div);
  });
}

// 播放
function play(channel){
  videoEl.src = channel.url;
  videoEl.load();
  videoEl.play().catch(e=>{});
  // 高亮选中
  document.querySelectorAll('.channel-item').forEach((el,i)=>{
    el.classList.toggle('active', el.textContent === channel.title);
  });
}
</script>
</body>
</html>
